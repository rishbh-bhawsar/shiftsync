version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shiftsync-mysql
    environment:
      MYSQL_ROOT_PASSWORD: qwerty
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build: .
    container_name: shiftsync-backend
    ports:
      - '5000:5000'
    env_file:
      - .env
    depends_on:
      - mysql
    environment:
      - ${DB_HOST}

volumes:
  mysql_data:
